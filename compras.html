<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compras - Sistema</title>

<style>
:root {
  --bg:#f8fafc;
  --bg2:#ffffff;
  --text:#0f172a;
  --border:#e2e8f0;
  --accent:#2563eb;
}

/* DARK MODE */
html.dark {
  --bg:#0f1117;
  --bg2:#161b27;
  --text:#f1f5f9;
  --border:#2d3748;
  --accent:#3b82f6;
}

body {
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
}

/* BOTÃO */
.btn {
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:var(--accent);
  color:#fff;
  font-size:16px;
}

/* KANBAN MOCK */
.container {
  padding:20px;
}

.card {
  background:var(--bg2);
  border:1px solid var(--border);
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Projeto Compras</h2>

  <!-- BOTÃO TEMA -->
  <button id="themeBtn" class="btn">🌙</button>
</div>

<div class="container">
  <div class="card">Solicitação #2187</div>
  <div class="card">Solicitação #2188</div>
</div>

<script>
// ==========================
// CONTROLE DE TEMA
// ==========================

function applyTheme(theme){
  const root = document.documentElement;

  if(theme === 'dark'){
    root.classList.add('dark');
  } else {
    root.classList.remove('dark');
  }

  localStorage.setItem('theme', theme);
  updateThemeIcon();
}

function toggleTheme(){
  const isDark = document.documentElement.classList.contains('dark');
  applyTheme(isDark ? 'light' : 'dark');
}

function updateThemeIcon(){
  const btn = document.getElementById('themeBtn');
  if(!btn) return;

  const isDark = document.documentElement.classList.contains('dark');
  btn.textContent = isDark ? '☀️' : '🌙';
}

function loadTheme(){
  const saved = localStorage.getItem('theme');

  if(saved){
    applyTheme(saved);
  } else {
    // fallback: segue sistema
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(prefersDark ? 'dark' : 'light');
  }
}

// ==========================
// INIT SEGURO (SEM ERRO)
// ==========================
document.addEventListener('DOMContentLoaded', () => {
  loadTheme();

  const btn = document.getElementById('themeBtn');
  if(btn){
    btn.addEventListener('click', toggleTheme);
  }
});
</script>

</body>
</html>
