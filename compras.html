<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Compras | Manual Operacional</title>

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#1e293b;
      --accent:#2563eb;
    }

    [data-theme="dark"]{
      --bg:#0f172a;
      --card:#1e293b;
      --text:#e2e8f0;
      --accent:#38bdf8;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .topbar{
      display:flex;
      align-items:center;
      padding:12px 20px;
      background:var(--card);
      border-bottom:1px solid #ddd;
    }

    .title{
      font-weight:bold;
      font-size:18px;
    }

    .btn{
      margin-left:auto;
      padding:6px 12px;
      cursor:pointer;
      border:none;
      border-radius:6px;
      background:var(--accent);
      color:#fff;
    }

    .container{
      padding:20px;
    }

    .kanban{
      display:flex;
      gap:16px;
      overflow-x:auto;
    }

    .col{
      background:var(--card);
      padding:10px;
      border-radius:8px;
      min-width:250px;
    }

    .col h3{
      margin-top:0;
    }

    .card{
      background:var(--bg);
      padding:10px;
      border-radius:6px;
      margin-bottom:10px;
      cursor:pointer;
      border-left:4px solid var(--accent);
    }

    .card:hover{
      opacity:0.85;
    }

    .detail{
      margin-top:20px;
      background:var(--card);
      padding:15px;
      border-radius:8px;
    }

  </style>
</head>

<body>

  <div class="topbar">
    <div class="title">📦 Compras - Manual Operacional</div>
    <button id="themeBtn" class="btn">🌙 Escuro</button>
  </div>

  <div class="container">

    <!-- KANBAN -->
    <div class="kanban">

      <div class="col">
        <h3>Coordenador</h3>
        <div class="card" onclick="det('c1')">Pedido recebido</div>
        <div class="card" onclick="det('c2')">Pedido triangulado</div>
      </div>

      <div class="col">
        <h3>Financeiro</h3>
        <div class="card" onclick="det('f1')">Análise financeira</div>
      </div>

      <div class="col">
        <h3>Diretoria</h3>
        <div class="card" onclick="det('d1')">Aprovação de margem</div>
      </div>

      <div class="col">
        <h3>Comprador</h3>
        <div class="card" onclick="det('b1')">Cotar e comprar</div>
        <div class="card" onclick="det('b2')">Validar NF</div>
      </div>

      <div class="col">
        <h3>Finalizado</h3>
        <div class="card" onclick="det('o1')">Fechamento</div>
      </div>

    </div>

    <!-- DETALHE -->
    <div id="detalhe" class="detail">
      <strong>Selecione um card para ver o fluxo.</strong>
    </div>

  </div>

  <script>

  document.addEventListener('DOMContentLoaded', () => {

    /* =========================
       BASE DE DADOS
    ========================= */
    const DATA = {
      c1:{
        title:'Pedido recebido',
        steps:[
          'Validar informações do pedido',
          'Conferir anexos obrigatórios',
          'Encaminhar para aprovação'
        ]
      },

      c2:{
        title:'Pedido triangulado',
        steps:[
          'Fornecedor entrega direto ao cliente',
          'Validar endereço',
          'Alinhar prazo'
        ]
      },

      f1:{
        title:'Análise financeira',
        steps:[
          'Verificar caixa',
          'Validar condição de pagamento',
          'Aprovar ou reprovar'
        ]
      },

      d1:{
        title:'Aprovação de margem',
        steps:[
          'Analisar markup',
          'Validar estratégia',
          'Autorizar compra'
        ]
      },

      b1:{
        title:'Cotar e comprar',
        steps:[
          'Buscar fornecedores',
          'Negociar preço e prazo',
          'Fechar compra'
        ]
      },

      b2:{
        title:'Validar NF',
        steps:[
          'Conferir dados fiscais',
          'Verificar valores',
          'Liberar financeiro'
        ]
      },

      o1:{
        title:'Fechamento',
        steps:[
          'Atualizar controle',
          'Confirmar entrega',
          'Encerrar processo'
        ]
      }
    };

    /* =========================
       DETALHE
    ========================= */
    window.det = function(id){
      const d = DATA[id];

      let html = `<h3>${d.title}</h3><ul>`;

      d.steps.forEach(s=>{
        html += `<li>${s}</li>`;
      });

      html += `</ul>`;

      document.getElementById('detalhe').innerHTML = html;
    };

    /* =========================
       TEMA
    ========================= */
    const btn = document.getElementById('themeBtn');

    function loadTheme(){
      const saved = localStorage.getItem('theme');

      if(saved === 'dark'){
        document.documentElement.setAttribute('data-theme','dark');
        btn.textContent = '☀️ Claro';
      }
    }

    function toggleTheme(){
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

      if(isDark){
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme','light');
        btn.textContent = '🌙 Escuro';
      }else{
        document.documentElement.setAttribute('data-theme','dark');
        localStorage.setItem('theme','dark');
        btn.textContent = '☀️ Claro';
      }
    }

    btn.addEventListener('click', toggleTheme);

    loadTheme();

  });

  </script>

</body>
</html>
