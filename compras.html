<script>
document.addEventListener('DOMContentLoaded', () => {

/* =========================
   BASE DE DADOS (DETALHES)
========================= */
const D = {
  c1:{
    title:'Pedido B2B recebido — verificação do Coordenador',
    phase:'Aprov. coordenador',
    steps:[
      {t:'Ler o ticket completo',b:'Verificar itens, cliente, endereço e empresa faturadora.'},
      {t:'Validar anexos',b:'Confirmar planilha de markup e ordem de compra.'},
      {t:'Encaminhar aprovação',b:'Se correto, seguir fluxo.'}
    ]
  },

  c2:{
    title:'Pedido triangulado',
    phase:'Aprov. coordenador',
    steps:[
      {t:'Validar tipo de entrega',b:'Fornecedor envia direto ao cliente.'},
      {t:'Confirmar endereço',b:'Evitar erro logístico.'}
    ]
  },

  f1:{
    title:'Análise financeira',
    phase:'Financeiro',
    steps:[
      {t:'Verificar caixa',b:'Empresa tem saldo para compra?'},
      {t:'Validar condição',b:'Preferência faturado.'}
    ]
  },

  d1:{
    title:'Aprovação de margem',
    phase:'Diretoria',
    steps:[
      {t:'Analisar markup',b:'Garantir rentabilidade'},
      {t:'Autorizar',b:'Liberar compra'}
    ]
  },

  b1:{
    title:'Cotar e comprar',
    phase:'Comprador',
    steps:[
      {t:'Buscar fornecedores',b:'Sempre comparar'},
      {t:'Negociar',b:'Preço e prazo'},
      {t:'Executar compra',b:'Formalizar pedido'}
    ]
  },

  b2:{
    title:'Validar NF',
    phase:'Comprador',
    steps:[
      {t:'Conferir dados fiscais',b:'CNPJ, valores, impostos'},
      {t:'Enviar ao financeiro',b:'Para pagamento'}
    ]
  },

  o1:{
    title:'Fechamento',
    phase:'Finalizado',
    steps:[
      {t:'Atualizar controle',b:'Planilha / sistema'},
      {t:'Encerrar card',b:'Fluxo concluído'}
    ]
  }
};

/* =========================
   DETALHE DO CARD
========================= */
window.det = function(id){
  const el = document.getElementById('det-panel');
  if(!el || !D[id]) return;

  // remover seleção anterior
  document.querySelectorAll('.kcard').forEach(c=>c.classList.remove('sel'));

  // selecionar atual
  const card = document.querySelector(`[data-id="${id}"]`);
  if(card) card.classList.add('sel');

  let html = `
    <div class="detail-head">
      <h3>${D[id].title}</h3>
      <span class="dphase">${D[id].phase}</span>
    </div>
    <div class="steps">
  `;

  D[id].steps.forEach((s,i)=>{
    html += `
      <div class="step">
        <div class="step-n">${i+1}</div>
        <div class="step-body">
          <strong>${s.t}</strong>
          <p>${s.b}</p>
        </div>
      </div>
    `;
  });

  html += `</div>`;

  el.innerHTML = html;
};

/* =========================
   TABS
========================= */
window.tab = function(name,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

  const panel = document.getElementById('tab-'+name);
  if(panel) panel.classList.add('active');
  if(btn) btn.classList.add('active');
};

/* =========================
   FILTRO KANBAN
========================= */
window.filt = function(tipo){
  document.querySelectorAll('.kcol').forEach(col=>{
    if(tipo === 'all'){
      col.style.display='block';
    }else{
      col.style.display = col.dataset.col === tipo ? 'block':'none';
    }
  });
};

/* =========================
   CHECKLIST
========================= */
window.ck = function(el){
  el.classList.toggle('done');
  updateProgress();
};

window.resetCk = function(){
  document.querySelectorAll('.citem').forEach(c=>c.classList.remove('done'));
  updateProgress();
};

function updateProgress(){
  const total = document.querySelectorAll('.citem').length;
  const done = document.querySelectorAll('.citem.done').length;

  const pct = total ? (done/total)*100 : 0;

  const bar = document.getElementById('prog');
  const txt = document.getElementById('ckcnt');

  if(bar) bar.style.width = pct+'%';
  if(txt) txt.textContent = `${done} / ${total}`;
}

/* =========================
   INIT
========================= */
updateProgress();

});
</script>
